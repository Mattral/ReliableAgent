name: CI

# Runs on every push and PR: lint (ruff), type-check (mypy), and the
# full test suite, across the Python versions this project declares
# support for in pyproject.toml. Mirrors exactly what
# .pre-commit-config.yaml runs locally, so "passes pre-commit"
# and "passes CI" are the same bar.
#
# NOTE: this workflow was never executed during this project's sandboxed
# development (no GitHub Actions runner, no network access to install
# ruff/mypy/pytest there). It HAS since been run by the project owner on
# real GitHub Actions infrastructure with real pydantic/pytest/ruff/mypy
# installed -- see docs/roadmap_status.md's "Post-Delivery Audit" section
# for what that first real run found (one real Pydantic-vs-shim bug,
# fixed in adr/0010) and what's still being addressed (ruff findings).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Mypy
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=reliableagent --cov-report=term-missing
