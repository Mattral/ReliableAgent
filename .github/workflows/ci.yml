name: CI

# Runs on every push and PR: lint (ruff), type-check (mypy), and the
# full test suite, across the Python versions this project declares
# support for in pyproject.toml. Mirrors exactly what
# .pre-commit-config.yaml runs locally, so "passes pre-commit"
# and "passes CI" are the same bar.
#
# NOTE: as documented prominently in docs/roadmap_status.md, this
# workflow has never actually executed in this delivery's sandboxed
# development environment (no GitHub Actions runner, no network access
# to install ruff/mypy/pytest). It is believed correct based on careful
# manual review but is explicitly flagged as unverified.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format check
        run: ruff format --check src tests
      - name: Mypy
        run: mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=reliableagent --cov-report=term-missing
